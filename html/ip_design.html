<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>劉俊興 作品集</title>
    <link rel="stylesheet" href="../css/carousel.css">
    
</head>


<body>

<header>
    <a href="../index.html">
        <img src="../img/my_logo.png" alt="Logo">
    </a>
</header>

<main style="flex: 1; display: flex; align-items: center; justify-content: center;">
    <div class="carousel-wrapper">
        
        <div class="crop-layer">
            <div class="container">
                <div class="item"><img src="../img/ip_design/chocolate.webp" alt="1"></div>
                <div class="item"><img src="../img/ip_design/croissant.webp" alt="2"></div>
                <div class="item"><img src="../img/ip_design/cup_cake.webp" alt="3"></div>
                <div class="item"><img src="../img/ip_design/macarons.webp" alt="4"></div>
                <div class="item"><img src="../img/ip_design/polo_bun.webp" alt="5"></div>
                <div class="item"><img src="../img/ip_design/pudding.webp" alt="6"></div>
                <div class="item"><img src="../img/ip_design/sub.webp" alt="7"></div>
            </div>
        </div>

        <button class="btn prev">&lt;</button>
        <button class="btn next">&gt;</button>
    </div>
</main>

<img class="bottom-building" src="../img/building1920X200.png" alt="Decor">

<footer></footer>

<script src="../script/corousel.js"></script>

</body>
</html>
