<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>劉俊興 作品集</title>
    <link rel="stylesheet" href="css/css.css">
    
</head>


<body>

<header>
    <a href="index.html">
        <img src="img/my_logo.png" alt="Logo">

</header>

<main style="flex: 1;">

        <img src="img/protfolio_logotype.webp" alt="Portfolio Title">

    <div class="portfolio-container">
        
        <div class="card">
            <div class="card-top">
                <img style="width: 177px; height: 205px;" src="img/macarons_px.webp" alt="形象設計">
            </div>
            <button class="card-btn" onclick="location.href='html/ip_design.html'">
                <div class="btn-inner"><span>形象設計</span></div>
            </button>
        </div>

        <div class="card">

        </div>

        <div class="card">
            <div class="card-top">

                <div class="btn-inner"><span>標案設計</span></div>
            </button>
        </div>

        <div class="card">
            <div class="card-top">
                <img style="width: 92px; height: 205px;" src="img/text_design92X205.webp" alt="文字設計">
            </div>
            <button class="card-btn" onclick="location.href='https://www.youtube.com/'">
                <div class="btn-inner"><span>文字設計</span></div>
            </button>

<img class="bottom-building" src="img/building1920X200.png" alt="Decor">
